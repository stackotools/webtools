<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Image Compressor Thumbnail</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Outfit', sans-serif;
}

body {
  background: #0e0e0e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.thumbnail {
  width: 1280px;
  height: 720px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  border-radius: px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}

.title-container {
  position: relative;
  z-index: 2;
  margin-bottom: 60px;
  text-align: center;
}

.title {
  font-size: 90px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 15px;
  background: linear-gradient(90deg, #00d2ff, #3a7bd5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
  position: relative;
  display: inline-block;
}

.subtitle {
  font-size: 28px;
  font-weight: 400;
  color: rgba(255,255,255,0.8);
  text-shadow: 0 2px 5px rgba(0,0,0,0.3);
  margin-top: 10px;
}

.process-flow {
  display: flex;
  align-items: center;
  gap: 50px;
  position: relative;
  z-index: 2;
}

.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  padding: 30px 40px;
  border-radius: 24px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}

.step::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #00d2ff, #3a7bd5);
}

.step:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  background: rgba(255,255,255,0.12);
}

.step i {
  font-size: 80px;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #00d2ff, #3a7bd5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}

.step p {
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.arrow i {
  font-size: 60px;
  color: rgba(255,255,255,0.6);
  text-shadow: 0 4px 8px rgba(0,0,0,0.4);
  transition: all 0.3s;
}

.arrow:hover i {
  color: #00d2ff;
  transform: scale(1.2);
}

/* Decorative elements */
.circle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,210,255,0.15) 0%, rgba(58,123,213,0) 70%);
  z-index: 0;
  filter: blur(20px);
}

.circle1 {
  width: 500px;
  height: 500px;
  top: -150px;
  left: -150px;
  animation: float 8s ease-in-out infinite;
}

.circle2 {
  width: 400px;
  height: 400px;
  bottom: -100px;
  right: -100px;
  animation: float 10s ease-in-out infinite reverse;
}

.circle3 {
  width: 300px;
  height: 300px;
  top: 50%;
  right: 100px;
  animation: float 7s ease-in-out infinite 2s;
}

.diamond {
  position: absolute;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.03);
  transform: rotate(45deg);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(5px);
}

.diamond1 {
  top: 100px;
  right: 150px;
  animation: float 9s ease-in-out infinite 1s;
}

.diamond2 {
  bottom: 80px;
  left: 120px;
  animation: float 11s ease-in-out infinite;
}

.badge {
  position: absolute;
  top: 40px;
  right: 40px;
  background: linear-gradient(135deg, #00d2ff, #3a7bd5);
  padding: 12px 24px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 24px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  z-index: 3;
}

@keyframes float {
  0% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
  100% { transform: translateY(0) rotate(0deg); }
}

/* Glow effects */
.glow {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: radial-gradient(circle at center, rgba(0,210,255,0.1) 0%, transparent 70%);
  z-index: 1;
}

/* Responsive adjustments */
@media (max-width: 1300px) {
  .thumbnail {
    transform: scale(0.8);
  }
}
</style>
</head>
<body>

<div class="thumbnail">
  <div class="glow"></div>
  <div class="circle circle1"></div>
  <div class="circle circle2"></div>
  <div class="circle circle3"></div>
  <div class="diamond diamond1"></div>
  <div class="diamond diamond2"></div>
  
  <div class="badge">
    <i class="fas fa-star"></i> ULTIMATE GUIDE
  </div>

  <div class="title-container">
    <div class="title">Advanced Image Compression</div>
    <div class="subtitle">Reduce file size without losing quality</div>
  </div>

  <div class="process-flow">
    <div class="step">
      <i class="fas fa-cloud-upload-alt"></i>
      <p>Upload</p>
    </div>
    <div class="arrow"><i class="fas fa-arrow-right"></i></div>
    <div class="step">
      <i class="fas fa-compress-alt"></i>
      <p>Optimize</p>
    </div>
    <div class="arrow"><i class="fas fa-arrow-right"></i></div>
    <div class="step">
      <i class="fas fa-file-download"></i>
      <p>Download</p>
    </div>
  </div>
</div>

</body>
</html>
